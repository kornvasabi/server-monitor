<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #e2e8f0; padding: 30px; }
        h1 { margin-bottom: 25px; font-size: 26px; color: #f8fafc; font-weight: 600; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        
        .box { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #334155; }
        .box h3 { font-size: 13px; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .value { font-size: 32px; font-weight: 700; }
        .cpu-color { color: #38bdf8; }
        .ram-color { color: #4ade80; }
        .disk-color { color: #f87171; }
        .uptime-color { color: #c084fc; }
        
        .net-details { font-size: 16px; line-height: 2; }
        
        .service-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
        .service-item:last-child { border-bottom: none; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-running { background-color: #065f46; color: #34d399; }
        .status-stopped { background-color: #78350f; color: #fbbf24; }
        .service-usage { font-size: 11px; color: #64748b; margin-left: 6px; }
    </style>
</head>
<body>

    <h1>💻 Server Status Monitor Room</h1>
    
    <div class="container">
        <div class="box">
            <h3>CPU Load</h3>
            <div class="value cpu-color"><span id="cpu">0.00</span> %</div>
        </div>
        <div class="box">
            <h3>RAM Usage</h3>
            <div class="value ram-color"><span id="ram">0.00</span> %</div>
        </div>
        <div class="box">
            <h3>Disk Usage</h3>
            <div class="value disk-color"><span id="disk">0.00</span> %</div>
        </div>
        <div class="box">
            <h3>Network Traffic</h3>
            <div class="net-details">
                <div>⬇️ Inbound: <strong style="color: #2dd4bf;"><span id="netRx">0.00</span> MB/s</strong></div>
                <div>⬆️ Outbound: <strong style="color: #fb923c;"><span id="netTx">0.00</span> MB/s</strong></div>
            </div>
        </div>
        <div class="box">
            <h3>System Uptime</h3>
            <div class="value uptime-color"><span id="uptime">0.0</span> Hrs</div>
        </div>
        <div class="box">
            <h3>⚙️ Services Status</h3>
            <div id="services-list">กำลังเชื่อมต่อข้อมูล...</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="box">
            <h3>CPU Load History (%)</h3>
            <div id="cpuChart"></div>
        </div>
        <div class="box">
            <h3>RAM Usage History (%)</h3>
            <div id="ramChart"></div>
        </div>
    </div>

    <script>
        // กำหนดโครงสร้างและดีไซน์ของกราฟ
        const chartOptions = (color, name) => ({
            series: [{ name: name, data: [] }],
            chart: { type: 'line', height: 200, animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 1000 } }, toolbar: { show: false } },
            stroke: { curve: 'smooth', width: 3 },
            colors: [color],
            xaxis: { labels: { show: false } },
            yaxis: { max: 100, min: 0, labels: { style: { colors: '#94a3b8' } } },
            grid: { borderColor: '#334155' }
        });

        // สร้างกราฟสำหรับ CPU และ RAM
        const cpuChart = new ApexCharts(document.querySelector("#cpuChart"), chartOptions('#38bdf8', 'CPU'));
        const ramChart = new ApexCharts(document.querySelector("#ramChart"), chartOptions('#4ade80', 'RAM'));
        
        cpuChart.render();
        ramChart.render();

        const cpuDataList = [];
        const ramDataList = [];
        const MAX_DATA_POINTS = 20; // ให้กราฟเก็บข้อมูลย้อนหลังสูงสุด 20 จุด

        const socket = io();
		
		// 🌟 [เพิ่มใหม่] รับข้อมูลประวัติก่อนวาดกราฟปัจจุบัน
        socket.on('initial-history', (historyData) => {
            // ข้อมูลจาก DB เรียงจากใหม่ไปเก่า (DESC) เราต้องใช้ .reverse() ให้เรียงจากเก่ามาใหม่
            historyData.reverse().forEach(row => {
                cpuDataList.push(parseFloat(row.cpu_percent));
                ramDataList.push(parseFloat(row.ram_percent));
            });
            // อัปเดตกราฟทันที
            cpuChart.updateSeries([{ data: cpuDataList }]);
            ramChart.updateSeries([{ data: ramDataList }]);
        });
		
        socket.on('server-data', (data) => {
            // 1. อัปเดตตัวเลขการ์ดด้านบน
            document.getElementById('cpu').innerText = data.cpu;
            document.getElementById('ram').innerText = data.ram;
            document.getElementById('disk').innerText = data.disk;
            document.getElementById('netRx').innerText = data.netRx;
            document.getElementById('netTx').innerText = data.netTx;
            document.getElementById('uptime').innerText = data.uptime;

            // 2. อัปเดตระบบกราฟ
            cpuDataList.push(parseFloat(data.cpu));
            ramDataList.push(parseFloat(data.ram));

            if (cpuDataList.length > MAX_DATA_POINTS) { cpuDataList.shift(); ramDataList.shift(); }

            cpuChart.updateSeries([{ data: cpuDataList }]);
            ramChart.updateSeries([{ data: ramDataList }]);

            // 3. อัปเดตรายการ Services
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';

            if (data.services && data.services.length > 0) {
                data.services.forEach(service => {
                    const isRunning = service.running;
                    const badgeClass = isRunning ? 'status-badge status-running' : 'status-badge status-stopped';
                    const statusText = isRunning ? 'Active' : 'Inactive';
                    
                    const cpuUsage = service.cpu ? service.cpu.toFixed(1) : '0.0';
                    const memUsage = service.mem ? service.mem.toFixed(1) : '0.0';

                    servicesList.innerHTML += `
                        <div class="service-item">
                            <div>
                                <strong>${service.name.toUpperCase()}</strong>
                                <span class="service-usage">(C: ${cpuUsage}% M: ${memUsage}%)</span>
                            </div>
                            <span class="${badgeClass}">${statusText}</span>
                        </div>
                    `;
                });
            } else {
                servicesList.innerHTML = '<span style="color: #64748b; font-size: 13px;">ไม่พบ Service ที่ตรวจสอบ (ระบบรองรับบน Linux เป็นหลัก)</span>';
            }
        });
    </script>
</body>
</html>
